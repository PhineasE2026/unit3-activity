<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Personality Quiz: Which Israeli politician are you?</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="container-fluid text-center mx-auto" id="heading-container">
      <h1 id="heading" class="text-dark">Personality Quiz: Which Israeli politician are you?</h1>
    </div>

    <div class="container mx-auto p-2">
      <form action="/submit" method="POST">
        <label>Question 1: Which fruit do you prefer?
            <select name="q1">
                <option value="tomato">Tomato</option>
                <option value="blueberry">Blueberry</option>
                <option value="olive">Olive</option>
                <option value="date">Date</option>
            </select>
        </label><br>

        <label>Question 2: Which country would you like to visit or visit again?
            <select name="q2">
                <option value="germany">Germany</option>
                <option value="russia">Russia</option>
                <option value="usa">United States</option>
                <option value="brazil">Brazil</option>
            </select>
        </label><br>

        <label>Question 3: Which sport do you enjoy the most?
            <select name="q3">
                <option value="germany">Football</option>
                <option value="russia">American Football</option>
                <option value="usa">Basketball</option>
                <option value="brazil">Ice Hockey</option>
            </select>
        </label><br>

        <button type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
